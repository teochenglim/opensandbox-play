apiVersion: sandbox.opensandbox.io/v1alpha1
kind: Pool
metadata:
  name: tutorial-pool
  namespace: default
spec:
  capacitySpec:
    bufferMin: 2
    bufferMax: 5
    poolMin: 2
    poolMax: 10
  template:
    spec:
      containers:
        - name: sandbox
          image: python:3.12-slim
          command: ["sleep", "3600"]
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
